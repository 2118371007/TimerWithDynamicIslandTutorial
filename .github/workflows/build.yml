name: Build iOS IPA

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Build unsigned app
      run: |
        # 我们用 -derivedDataPath 指定一个缓存目录，不再打乱内部编译路径
        xcodebuild clean build \
          -project TimerWithDynamicIsland.xcodeproj \
          -scheme TimerWithDynamicIsland \
          -configuration Debug \
          -sdk iphoneos \
          -derivedDataPath ./DerivedData \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Package into IPA
      run: |
        mkdir Payload
        # 去深层缓存目录里把编译好的 .app 文件捞出来放到 Payload 里
        mv ./DerivedData/Build/Products/Debug-iphoneos/*.app Payload/
        zip -r TimerApp_Unsigned.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Unsigned_IPA
        path: TimerApp_Unsigned.ipa